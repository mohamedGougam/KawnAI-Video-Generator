# One Render web service: Next.js UI + FastAPI API behind nginx on the same URL.
# After first deploy, confirm CORS_ORIGINS matches your *.onrender.com URL (see envVars).

services:
  - type: web
    name: kawnai-video-generator
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DEVICE
        value: auto
      - key: HF_HOME
        value: /var/hf-cache
      - key: CORS_ORIGINS
        value: https://kawnai-video-generator.onrender.com,http://localhost:3000
      - key: HF_TOKEN
        sync: false

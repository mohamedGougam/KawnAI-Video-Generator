# One Render web service: Next.js UI + FastAPI API behind nginx on the same URL.
# Key Value (Redis) is included so the API enqueues jobs and start.sh runs an ARQ worker
# (see deploy/start.sh). Remove the `kawnai-video-redis` service and REDIS_URL if you want
# inline-only generation again.
#
# After first deploy, confirm CORS_ORIGINS matches your *.onrender.com URL (see envVars).

# Wan inference on CPU needs substantial RAM — use at least Standard 4 GB for the web service.
services:
  - type: web
    name: kawnai-video-generator
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    # plan: standard  # uncomment / set in dashboard if you hit memory limit alerts
    envVars:
      - key: DEVICE
        value: auto
      - key: HF_HOME
        value: /var/hf-cache
      - key: CORS_ORIGINS
        value: https://kawnai-video-generator.onrender.com,http://localhost:3000
      - key: HF_TOKEN
        sync: false
      - key: REDIS_URL
        fromService:
          name: kawnai-video-redis
          type: keyvalue
          property: connectionString
      - key: MIN_AVAILABLE_RAM_MB
        value: "3500"

  # Redis-compatible queue for ARQ (private network; no public IP allowlist).
  - type: keyvalue
    name: kawnai-video-redis
    ipAllowList: []
